<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  />

  <meta
    name="theme-color"
    content="#0d6efd"
  />

  <!-- SEO Meta Tags -->
  <title>
    Inertia Infotech | Software Development Company
  </title>

  <meta
    name="description"
    content="Inertia Infotech provides modern software development, web development, mobile app development, ERP solutions, UI/UX design, and IT consulting services for businesses."
  />

  <meta
    name="keywords"
    content="software company, software development, web development, app development, ERP solutions, IT consulting, React development, business software, India"
  />

  <meta
    name="author"
    content="Inertia Infotech"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <!-- Open Graph Meta Tags -->
  <meta
    property="og:title"
    content="Inertia Infotech | Software Development Company"
  />

  <meta
    property="og:description"
    content="Modern software solutions for businesses including websites, mobile apps, ERP systems, and IT consulting."
  />

  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:url"
    content="https://inertiasoftware.in"
  />

  <meta
    property="og:image"
    content="https://inertiasoftware.in/logo192.png"
  />

  <!-- Twitter Meta Tags -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="Inertia Infotech"
  />

  <meta
    name="twitter:description"
    content="Software Development & IT Solutions Company"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="%PUBLIC_URL%/favicon.png"
  />

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>

  <div id="root"></div>

</body>

</html>
